<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cleansheet</title>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
/* ── TEMA OSCURO (default) ── */
:root,[data-theme="dark"]{
  --bg:#0a0b0e;--panel:#111318;--panel2:#181b22;--panel3:#1e222c;
  --line:#252930;--line2:#2e333f;
  --tx:#eceef2;--tx2:#8890a4;--tx3:#4a5166;
  --accent:#a78bfa;--accent-dim:#1e1433;--accent-tx:#0a0b0e;
  --show:#f6c046;--sc:#4cc28a;--lc:#e26ba6;--llegada:#7a8190;--cambio:#ef7a5a;--loadin:#e0a23c;--offstage:#9b7be8;
  --danger:#f47b7b;--danger-dim:#2a0a0a;
  --th-bg:#1a1d25;--th-tx:#8890a4;
  --row-hover:#181b22;
}
/* ── TEMA CLARO ── */
[data-theme="light"]{
  --bg:#f4f5f7;--panel:#ffffff;--panel2:#f7f8fa;--panel3:#eef0f3;
  --line:#e3e6ea;--line2:#d4d8de;
  --tx:#1a1d23;--tx2:#5a6472;--tx3:#9aa3b2;
  --accent:#7c3aed;--accent-dim:#ede9fe;--accent-tx:#ffffff;
  --show:#d4920a;--sc:#2a9d6f;--lc:#c44f8a;--llegada:#6a7280;--cambio:#d4623e;--loadin:#bd7e1a;--offstage:#7d5cc8;
  --danger:#d64545;--danger-dim:#fbe8e8;
  --th-bg:#eef0f3;--th-tx:#5a6472;
  --row-hover:#f7f8fa;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Helvetica Neue',Arial,system-ui,sans-serif;-webkit-font-smoothing:antialiased;transition:background .25s,color .25s}
body{display:flex;flex-direction:column;height:100vh;overflow:hidden}
:root{--mono:ui-monospace,'SF Mono',Consolas,monospace;--r:8px;--rl:12px}

/* TOPBAR */
.topbar{display:flex;align-items:center;height:52px;background:var(--panel);border-bottom:1px solid var(--line);flex-shrink:0;z-index:40}
.logo{display:flex;align-items:center;gap:10px;padding:0 20px;border-right:1px solid var(--line);height:100%;cursor:pointer;min-width:180px}
.logo-mark{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:16px;height:16px}
.logo-name{font-size:15px;font-weight:700;letter-spacing:-.3px;color:var(--tx)}
.breadcrumb{display:flex;align-items:center;gap:6px;padding:0 20px;flex:1;font-size:13px;color:var(--tx2)}
.breadcrumb .sep{color:var(--tx3)}
.breadcrumb .current{color:var(--tx);font-weight:600}
.back{display:flex;align-items:center;gap:5px;background:transparent;border:none;color:var(--tx2);cursor:pointer;font-size:13px;font-family:inherit;padding:4px 8px;border-radius:var(--r);transition:.12s}
.back:hover{background:var(--panel2);color:var(--tx)}
.back svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.topbar-actions{display:flex;align-items:center;gap:8px;padding:0 16px}
.tbtn{display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-size:12px;font-weight:600;padding:7px 13px;border-radius:var(--r);cursor:pointer;transition:.12s;border:1px solid var(--line2);background:var(--panel2);color:var(--tx2)}
.tbtn:hover{background:var(--panel3);color:var(--tx)}
.tbtn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.tbtn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-tx);font-weight:700}
.theme-toggle{width:34px;height:34px;border-radius:var(--r);border:1px solid var(--line2);background:var(--panel2);color:var(--tx2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.theme-toggle:hover{background:var(--panel3);color:var(--tx)}
.theme-toggle svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8}
.user-pill{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:20px;background:var(--panel2);border:1px solid var(--line2);font-size:12px;color:var(--tx2)}
.user-dot{width:7px;height:7px;border-radius:50%;background:var(--sc);box-shadow:0 0 5px var(--sc)}

/* LAYOUT */
.main{display:flex;flex:1;overflow:hidden}
.sidebar{width:190px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
.sidebar.hidden{display:none}
.nav{flex:1;padding:10px 8px;overflow-y:auto}
.nav-label{font-size:10px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--tx3);padding:10px 8px 4px}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;color:var(--tx2);font-size:13px;font-weight:500;transition:.12s;border:none;background:transparent;width:100%;text-align:left;font-family:inherit}
.nav-item:hover{background:var(--panel2);color:var(--tx)}
.nav-item.active{background:var(--accent-dim);color:var(--accent)}
.nav-item svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;flex-shrink:0}
.nav-foot{padding:12px;border-top:1px solid var(--line);font-size:10px;color:var(--tx3);font-family:var(--mono)}
.content{flex:1;overflow-y:auto;display:flex;flex-direction:column}

/* LOGIN */
.login-screen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;padding:40px}
.login-logo{width:56px;height:56px;background:var(--accent);border-radius:14px;display:flex;align-items:center;justify-content:center}
.login-logo svg{width:32px;height:32px}
.login-title{font-size:28px;font-weight:800;letter-spacing:-.03em}
.login-sub{font-size:15px;color:var(--tx2);text-align:center;max-width:340px;line-height:1.6}
.login-btn{display:flex;align-items:center;gap:10px;padding:13px 24px;border-radius:var(--rl);background:#fff;color:#1a1a1a;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:inherit}
.login-btn svg{width:20px;height:20px}

/* LOADING */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;flex:1}
.spinner{width:30px;height:30px;border:2px solid var(--line2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:var(--tx2)}

/* HOME */
.home{padding:32px 28px}
.home-kicker{font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--tx3);font-weight:700;margin-bottom:8px}
.home-title{font-size:28px;font-weight:800;letter-spacing:-.03em}
.home-sub{font-size:14px;color:var(--tx2);margin-top:6px;margin-bottom:24px}
.drive-status{display:flex;align-items:center;gap:8px;background:var(--panel);border:1px solid var(--line);border-radius:var(--rl);padding:12px 16px;margin-bottom:24px}
.drive-dot{width:8px;height:8px;border-radius:50%;background:var(--sc);box-shadow:0 0 6px var(--sc)}
.drive-status span{font-size:13px;color:var(--tx2)}
.drive-status strong{color:var(--tx)}
.projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px}
.project-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rl);padding:18px;cursor:pointer;transition:.15s;display:flex;flex-direction:column;gap:12px}
.project-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.pc-name{font-size:16px;font-weight:700;letter-spacing:-.02em}
.pc-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;background:var(--accent-dim);color:var(--accent)}
.pc-meta{font-size:12px;color:var(--tx3);font-family:var(--mono)}
.pc-footer{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--line)}
.pc-date{font-size:11px;color:var(--sc)}
.pc-arrow{color:var(--tx3);font-size:18px;transition:.12s}
.project-card:hover .pc-arrow{color:var(--accent);transform:translateX(3px)}

/* EVENT FILTERS */
.event-filters{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--line);background:var(--panel);flex-shrink:0}
.filter-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-right:4px}
.filter-btn{font-family:inherit;font-size:12px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;transition:.12s;border:1px solid var(--line2);background:transparent;color:var(--tx2)}
.filter-btn:hover{color:var(--tx)}
.filter-btn.on{background:var(--accent);border-color:var(--accent);color:var(--accent-tx)}
.filter-sep{width:1px;height:20px;background:var(--line2);margin:0 4px}

/* SECTION CONTENT */
.section-content{flex:1;overflow:auto;padding:20px}
.sec-title{font-size:20px;font-weight:800;letter-spacing:-.02em;margin-bottom:4px}
.sec-sub{font-size:13px;color:var(--tx2);margin-bottom:18px}

/* TABLES GENERAL */
.ct{width:100%;border-collapse:collapse;font-size:13px}
.ct th{text-align:center;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--th-tx);padding:9px 10px;background:var(--th-bg);border:1px solid var(--line);white-space:nowrap;position:sticky;top:0}
.ct td{padding:8px 10px;border:1px solid var(--line);text-align:center;font-family:var(--mono);font-size:12px}
.ct tr:hover td{background:var(--row-hover)}
.ct .rowlabel{text-align:left;font-family:inherit;font-weight:600;color:var(--tx2);background:var(--panel2);font-size:11px;text-transform:uppercase;letter-spacing:.04em;white-space:nowrap}
.ct .empty{color:var(--tx3)}

/* HORARIOS */
.h-legend{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.h-li{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx2)}
.h-dot{width:8px;height:8px;border-radius:50%}
.sync-note{margin-left:auto;font-size:11px;color:var(--sc);font-family:var(--mono);cursor:pointer}
.hz-table{width:100%;border-collapse:collapse;font-size:13px}
.hz-table th{text-align:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--th-tx);padding:10px 8px;background:var(--th-bg);border:1px solid var(--line);white-space:nowrap}
.hz-table td{padding:9px 10px;border:1px solid var(--line);text-align:center;font-family:var(--mono);font-size:12px}
.hz-table .artist-cell{font-family:inherit;font-weight:700;font-size:13px;text-align:left;color:var(--tx)}
.hz-table .stage-pill{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;font-family:inherit}
.hz-table tr:hover td{background:var(--row-hover)}
.hz-show{color:var(--show);font-weight:700}
.hz-empty{color:var(--tx3)}
.hz-dur{font-size:10px;color:var(--tx3)}

/* OVERALL grid (bandas en columnas) */
.overall-wrap{overflow-x:auto}
.overall-table{border-collapse:collapse;font-size:12px;min-width:100%}
.overall-table th{background:var(--th-bg);color:var(--th-tx);font-size:11px;font-weight:700;padding:10px 14px;border:1px solid var(--line);text-align:center;white-space:nowrap;position:sticky;top:0}
.overall-table th.cat-col{text-align:left;position:sticky;left:0;z-index:2}
.overall-table td{padding:7px 14px;border:1px solid var(--line);font-size:12px;text-align:center;font-family:var(--mono);min-width:130px}
.overall-table .cat{text-align:left;font-weight:600;color:var(--tx2);background:var(--panel2);font-family:inherit;text-transform:uppercase;font-size:10px;letter-spacing:.05em;position:sticky;left:0;white-space:nowrap}
.overall-table .section-cat{background:var(--accent-dim);color:var(--accent);font-weight:700;font-size:11px}
.overall-table tr:hover td:not(.cat){background:var(--row-hover)}
.overall-table .band-head{font-family:inherit;font-weight:700;font-size:13px;color:var(--tx)}

/* INPUT LIST */
.bandas-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.banda-tab{font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;cursor:pointer;border:1px solid var(--line2);background:transparent;color:var(--tx2);transition:.12s}
.banda-tab:hover{color:var(--tx)}
.banda-tab.on{background:var(--accent);border-color:var(--accent);color:var(--accent-tx)}
.io-block{background:var(--panel);border:1px solid var(--line);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
.io-head{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--line);background:var(--panel2)}
.io-name{font-size:15px;font-weight:700}
.io-meta{font-size:11px;color:var(--tx3);font-family:var(--mono);margin-left:auto}
.io-divider{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--tx3);padding:8px 14px;background:var(--panel3);border-bottom:1px solid var(--line);border-top:1px solid var(--line)}
.io-table{width:100%;border-collapse:collapse;font-size:12px}
.io-table th{text-align:left;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--th-tx);padding:7px 12px;background:var(--th-bg);border-bottom:1px solid var(--line)}
.io-table td{padding:5px 12px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:12px}
.io-table tr:hover td{background:var(--row-hover)}
.io-table .ch{color:var(--tx3);width:34px}
.io-table .inst{color:var(--tx);font-weight:500;font-family:inherit}
.io-table .infra{color:var(--accent)}

/* SUMA totales */
.suma-totals{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.suma-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rl);padding:14px 16px}
.suma-card-band{font-size:13px;font-weight:700;margin-bottom:8px}
.suma-card-row{display:flex;justify-content:space-between;font-size:12px;color:var(--tx2);padding:3px 0}
.suma-card-row span:last-child{font-family:var(--mono);color:var(--accent);font-weight:700}

/* PERSONAL */
.personal-wrap{padding:4px}
.esc-block{background:var(--panel);border:1px solid var(--line);border-radius:var(--rl);overflow:hidden;margin-bottom:20px}
.esc-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);background:var(--accent-dim)}
.esc-head-icon{width:30px;height:30px;border-radius:8px;background:var(--accent);color:var(--accent-tx);display:flex;align-items:center;justify-content:center}
.esc-head-icon svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2}
.esc-name{font-size:15px;font-weight:700;color:var(--accent)}
.turno-block{padding:0}
.turno-head{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--panel2);border-bottom:1px solid var(--line)}
.turno-tag{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);background:var(--panel3);padding:3px 10px;border-radius:20px}
.turno-table{width:100%;border-collapse:collapse;font-size:12px}
.turno-table th{text-align:center;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--th-tx);padding:8px 10px;background:var(--th-bg);border:1px solid var(--line);white-space:nowrap}
.turno-table td{padding:8px 10px;border:1px solid var(--line);text-align:center;font-size:12px}
.turno-table .role-label{font-weight:700;color:var(--tx2);background:var(--panel2);text-transform:uppercase;font-size:10px;letter-spacing:.05em}
.turno-table .tec-name{font-weight:600;color:var(--tx);font-family:inherit}
.turno-table .tec-contact{font-family:var(--mono);color:var(--tx2);font-size:11px}
.turno-table tr:hover td{background:var(--row-hover)}

/* INFO */
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:24px}
.info-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--rl);padding:16px}
.info-label{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);margin-bottom:6px}
.info-value{font-size:16px;font-weight:700;color:var(--tx)}
.info-value.accent{color:var(--accent)}

/* EMPTY */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:60px 40px;text-align:center}
.empty-state svg{width:44px;height:44px;stroke:var(--tx3);fill:none;stroke-width:1.2;opacity:.4}
.empty-state h3{font-size:17px;font-weight:700;color:var(--tx2)}
.empty-state p{font-size:13px;color:var(--tx3);max-width:340px;line-height:1.6}
.empty-state code{font-family:var(--mono);font-size:11px;color:var(--accent)}

::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:3px}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo" onclick="goHome()">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none">
        <rect x="1" y="1" width="6" height="9" rx="1" fill="#0a0b0e"/>
        <rect x="9" y="1" width="6" height="5" rx="1" fill="#0a0b0e"/>
        <rect x="9" y="8" width="6" height="7" rx="1" fill="#0a0b0e"/>
        <rect x="1" y="12" width="6" height="3" rx="1" fill="#0a0b0e"/>
      </svg>
    </div>
    <span class="logo-name">Cleansheet</span>
  </div>
  <div class="breadcrumb" id="breadcrumb"><span style="color:var(--tx3)">Proyectos activos</span></div>
  <div class="topbar-actions" id="topbar-actions">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-toggle" title="Cambiar tema">
      <svg id="theme-icon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    </button>
    <div id="auth-area"></div>
  </div>
</div>

<div class="main">
  <div class="sidebar hidden" id="sidebar">
    <div class="nav" id="nav-sections"></div>
    <div class="nav-foot" id="nav-foot"></div>
  </div>

  <div class="content" id="content">
    <!-- LOGIN -->
    <div id="view-login" class="login-screen">
      <div class="login-logo">
        <svg viewBox="0 0 16 16" fill="none">
          <rect x="1" y="1" width="6" height="9" rx="1" fill="#0a0b0e"/>
          <rect x="9" y="1" width="6" height="5" rx="1" fill="#0a0b0e"/>
          <rect x="9" y="8" width="6" height="7" rx="1" fill="#0a0b0e"/>
          <rect x="1" y="12" width="6" height="3" rx="1" fill="#0a0b0e"/>
        </svg>
      </div>
      <div class="login-title">Cleansheet</div>
      <div class="login-sub">Gestión técnica de festivales. Conecta con Google Drive para empezar.</div>
      <button class="login-btn" onclick="signIn()">
        <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Conectar con Google
      </button>
    </div>

    <!-- LOADING -->
    <div id="view-loading" style="display:none"><div class="loading"><div class="spinner"></div><div class="loading-text" id="loading-text">Cargando...</div></div></div>

    <!-- HOME -->
    <div id="view-home" style="display:none" class="home">
      <div class="home-kicker">Admin · Temporada 2026</div>
      <div class="home-title">Proyectos activos</div>
      <div class="home-sub">Eventos desde tu Google Drive</div>
      <div class="drive-status">
        <div class="drive-dot"></div>
        <span>Drive conectado · carpeta <strong>EVENTOS ACTIVOS</strong></span>
      </div>
      <div class="projects-grid" id="projects-grid"></div>
    </div>

    <!-- EVENT -->
    <div id="view-event" style="display:none;flex-direction:column;height:100%">
      <div class="event-filters" id="event-filters"></div>
      <div class="section-content" id="section-content"></div>

async function sheetsGet(id,range){

  if(r.status===401){handleAuthExpired();throw new Error('Sesion expirada');}
  if(!r.ok)throw new Error('Sheets '+r.status);
  return (await r.json()).values||[];
}

  if(!r.ok)throw new Error('Meta '+r.status);

/* ── PARSE ── */
function findTab(tabs,names){
  for(const n of names){
    const t=tabs.find(x=>x.toUpperCase().replace(/\s+/g,'')===n.toUpperCase().replace(/\s+/g,''));
    if(t)return t;
  }
  // contains
  for(const n of names){
    const t=tabs.find(x=>x.toUpperCase().includes(n.toUpperCase()));
    if(t)return t;
  }
  return null;
}

function parseProject(data){
  const {tabs,raw}=data;
  const P={tabs,raw,info:{},horarios:[],overall:null,inputs:[],monitores:[],personal:null,escenarios:[],numBandas:0};

  // INFO — guardar con clave original y uppercase para busqueda flexible
  const infoTab=findTab(tabs,['INFO','CONFIG']);
  if(infoTab&&raw[infoTab]){
    raw[infoTab].forEach(row=>{
      if(row[0]){
        const key=row[0].toString().trim();
        const val=(row[1]||'').toString().trim();
        P.info[key]=val;
        P.info[key.toUpperCase()]=val;
        P.info[key.toUpperCase().replace(/\s+/g,'_')]=val;
      }
    });
  }
  // Escenarios desde INFO
  let escStr=P.info['ESCENARIOS']||'';
  if(escStr){
    if(/^\d+$/.test(escStr.trim())){
      const n=parseInt(escStr);
      P.escenarios=Array.from({length:n},(_,i)=>`Escenario ${i+1}`);
    } else {
      P.escenarios=escStr.split(',').map(s=>s.trim()).filter(Boolean);
    }
  }

  // HORARIOS
  const horTab=findTab(tabs,['HORARIOS','HORARIO']);
  if(horTab&&raw[horTab]){
    const parsed=parseHorarios(raw[horTab]);
    P.horariosDays=parsed.days;
    P.horHeader=parsed.header;
    P.horTimeCols=parsed.timeCols||[];
    P.horarios=parsed.days.flatMap(d=>(d.stages||[]).flatMap(s=>s.acts||[]));
    // Escenarios desde los bloques detectados
    const stageNames=[...new Set(parsed.days.flatMap(d=>(d.stages||[]).map(s=>s.name)))];
    if(!P.escenarios.length&&stageNames.length) P.escenarios=stageNames;
  }

  // OVERALL — mantener todas las filas para grid completo
  const ovTab=findTab(tabs,['OVERALL']);
  if(ovTab&&raw[ovTab]){
    const allRows=(raw[ovTab]||[]);
    // Buscar fila cabecera: la que tiene "BANDA" en alguna celda (no la primera col)
    let headIdx=allRows.findIndex(r=>r&&r.slice(1).some(c=>/BANDA/i.test(c||'')));
    if(headIdx<0)headIdx=0;
    const head=allRows[headIdx]||[];
    const bandas=head.slice(1).map(b=>(b||'').trim()).filter(Boolean);
    P.numBandas=Math.max(P.numBandas,bandas.length);
    const dataRows=allRows.slice(headIdx+1)
      .map(r=>({cat:(r[0]||'').trim(),vals:bandas.map((_,bi)=>(r[bi+1]||'').trim())}))
      .filter(row=>row.cat); // mantener filas con categoria aunque valores vacios
    P.overall={bandas,rows:dataRows};
  }

  // INPUT LIST / SUMA
  const inTab=findTab(tabs,['INPUT','SUMA','INPUTLIST']);
  if(inTab&&raw[inTab]){
    P.inputsRaw=raw[inTab];
    P.inputs=parseInputList(raw[inTab]);
    P.numBandas=Math.max(P.numBandas,P.inputs.length);
  }

  // MONITORES
  const monTab=findTab(tabs,['MONITORES','MONITOR','OUTPUT']);
  if(monTab&&raw[monTab]){
    P.monitores=parseMonitores(raw[monTab]);
  }

  // PERSONAL
  const persTab=findTab(tabs,['PERSONAL','TURNOS']);
  if(persTab&&raw[persTab]){
    P.personal=parsePersonal(raw[persTab]);
  }

  return P;
}

/* ══ PARSERS REALES basados en estructura visual de la plantilla ══ */

/* SUMA / INPUT LIST
   Estructura: fila0=nombre banda cada 6 cols (A,G,M,S)
               filas 1-4 = info/soundcheck/show (ignorar)
               fila5 = cabeceras: IN, INST, MIC, STANDS, S.BOX, INFO
               fila6+ = datos de canales
   Bloques de 6 columnas por banda
*/
function parseInputList(rows){
  if(!rows||rows.length<2)return [];
  const BLOCK=6;
  // Fila 0: nombres de banda en posiciones 0, 6, 12, 18...
  const bandRow=rows[0]||[];
  const bands=[];
  for(let col=0;col<bandRow.length;col+=BLOCK){
    const name=(bandRow[col]||'').toString().trim();
    if(name)bands.push({col,name});
  }
  if(!bands.length)return [];

  // Buscar fila de cabeceras: la que tiene "IN" o "INST" en la primera col del primer bloque
  let hRow=-1;
  for(let r=1;r<Math.min(rows.length,8);r++){
    const row=rows[r]||[];
    const cell=(row[bands[0].col]||'').toString().trim().toUpperCase();
    if(cell==='IN'||cell==='INST'||cell==='CH'){hRow=r;break;}
  }
  if(hRow<0){
    // buscar fila con cabeceras típicas
    for(let r=1;r<Math.min(rows.length,8);r++){
      const row=rows[r]||[];
      if(row.some(c=>{const v=(c||'').toString().trim().toUpperCase();return v==='IN'||v==='INST'||v==='MIC';})){hRow=r;break;}
    }
  }
  if(hRow<0)hRow=4; // fallback fila 5 (índice 4)

  const fieldRow=rows[hRow]||[];
  const result=[];
  bands.forEach(({col,name},bi)=>{
    // Leer cabeceras del bloque
    const fields=[];
    for(let f=0;f<BLOCK;f++){
      fields.push((fieldRow[col+f]||'').toString().trim().toUpperCase());
    }
    const inPos=fields.findIndex(f=>f==='IN'||f==='CH');
    const instPos=fields.findIndex(f=>f==='INST'||f.includes('INST'));
    const micPos=fields.findIndex(f=>f==='MIC');
    const standsPos=fields.findIndex(f=>f==='STANDS'||f==='STAND');
    const sboxPos=fields.findIndex(f=>f==='S.BOX'||f==='SBOX'||f==='S BOX');
    const infoPos=fields.findIndex(f=>f==='INFO');
    const channels=[];
    for(let r=hRow+1;r<rows.length;r++){
      const row=rows[r]||[];
      const ch=inPos>=0?(row[col+inPos]||'').toString().trim():'';
      if(!ch)continue;
      channels.push({
        ch,
        inst:instPos>=0?(row[col+instPos]||'').toString().trim():'',
        mic:micPos>=0?(row[col+micPos]||'').toString().trim():'',
        stands:standsPos>=0?(row[col+standsPos]||'').toString().trim():'',
        sbox:sboxPos>=0?(row[col+sboxPos]||'').toString().trim():'',
        info:infoPos>=0?(row[col+infoPos]||'').toString().trim():'',
      });
    }
    result.push({idx:bi+1,name,channels});
  });
  return result;
}

/* MONITORES
   Estructura: fila0=BANDA 1, BANDA 2... cada 4 cols (A,E,I,M)
               fila1=cabeceras: OUT, PATCH, MONITOR, NOTAS
               fila2+ = datos
   Bloques de 4 columnas (o 5 con la col de fila vacía entre bandas)
*/
function parseMonitores(rows){
  if(!rows||rows.length<2)return [];
  // Detectar ancho de bloque buscando "BANDA" en fila 0
  const headRow=rows[0]||[];
  const bands=[];
  headRow.forEach((c,i)=>{
    if(/BANDA\s*\d+/i.test((c||'').toString())){
      bands.push({col:i,name:(c||'').toString().trim()});
    }
  });
  if(!bands.length)return [];

  // fila 1 = cabeceras
  const fieldRow=rows[1]||[];
  const result=[];
  bands.forEach(({col,name},bi)=>{
    // ancho de bloque = distancia a la siguiente banda o fin
    const nextCol=bands[bi+1]?bands[bi+1].col:headRow.length;
    const width=nextCol-col;
    const fields=[];
    for(let f=0;f<width;f++) fields.push((fieldRow[col+f]||'').toString().trim().toUpperCase());
    const outPos=fields.findIndex(f=>f==='OUT');
    const patchPos=fields.findIndex(f=>f==='PATCH');
    const monPos=fields.findIndex(f=>f==='MONITOR'||f==='MON');
    const notasPos=fields.findIndex(f=>f==='NOTAS'||f==='NOTES');
    const outs=[];
    for(let r=2;r<rows.length;r++){
      const row=rows[r]||[];
      const out=outPos>=0?(row[col+outPos]||'').toString().trim():'';
      const patch=patchPos>=0?(row[col+patchPos]||'').toString().trim():'';
      const monitor=monPos>=0?(row[col+monPos]||'').toString().trim():'';
      const notas=notasPos>=0?(row[col+notasPos]||'').toString().trim():'';
      if(out||(patch&&monitor)) outs.push({out,patch,monitor,notas});
    }
    result.push({idx:bi+1,name,outs});
  });
  return result;
}

/* HORARIOS
   Estructura real:
   - Fila con una sola celda no vacía = titulo de DIA (VIERNES 10, SABADO 12)
   - Fila siguiente = cabeceras: [vacío, BAND, ARRIVAL, SET UP ON STAGE, ...]
   - Col A = escenario (texto vertical, puede repetirse o estar vacío para mismo escenario)
   - Col B = nombre de banda
   - Cols C+ = tiempos
   - Filas vacías = separadores entre escenarios
   - Nuevo bloque de DIA tras filas vacías
*/
function parseHorarios(rows){
  if(!rows||!rows.length)return {days:[],header:[]};
  const days=[];
  let curDay=null;
  let header=[];
  let curStage='';

  for(let r=0;r<rows.length;r++){
    const row=rows[r]||[];
    const vals=row.map(c=>(c||'').toString().trim());
    const nonEmpty=vals.filter(Boolean);

    // Fila de DIA: una sola celda con texto, todas las demás vacías
    if(nonEmpty.length===1&&nonEmpty[0].length>3){
      // Verificar que la siguiente tiene cabeceras tipo BAND/ARRIVAL
      const nextRow=(rows[r+1]||[]).map(c=>(c||'').toString().trim());
      const isHeader=nextRow.some(v=>/^(BAND|ARRIVAL|SET UP|SOUNDCHECK|SHOW TIME|DURATION)/i.test(v));
      if(isHeader){
        curDay={name:nonEmpty[0],stages:[]};
        days.push(curDay);
        curStage='';
        // leer cabeceras (fila r+1)
        header=(rows[r+1]||[]).map(c=>(c||'').toString().trim());
        r++; // saltar cabecera
        continue;
      }
    }

    if(!curDay)continue;

    // Fila vacía = separador (resetear escenario actual para nueva agrupación)
    if(!nonEmpty.length){
      curStage='';
      continue;
    }

    // Col A puede tener nombre de escenario (texto vertical en Sheets llega como texto en primera celda)
    const colA=vals[0];
    const colB=vals[1]; // nombre de banda
    const colAisstage=colA&&!/^\d/.test(colA); // no empieza por número

    if(colA&&colAisstage&&colA!==curStage){
      curStage=colA;
    }

    // Si colB es el nombre de banda (col B tiene contenido)
    const bandName=colB||colA;
    if(!bandName)continue;
    // evitar leer filas de cabecera interior
    if(/^(BAND|ARRIVAL|SET UP|SOUNDCHECK|SHOW|DURATION)/i.test(bandName))continue;

    // Buscar o crear bloque de escenario
    const stageName=curStage||'Stage 1';
    let stageBlock=curDay.stages.find(s=>s.name===stageName);
    if(!stageBlock){stageBlock={name:stageName,acts:[]};curDay.stages.push(stageBlock);}

    // Leer tiempos usando el header (col 0=escenario, col 1=band, col 2+=tiempos)
    const act={banda:bandName,escenario:stageName};
    // Cabeceras de tiempo empiezan en col 2 del header
    header.forEach((h,i)=>{
      if(i<2||!h)return; // saltar cols de escenario y banda
      act[h]=(row[i]||'').toString().trim();
    });
    stageBlock.acts.push(act);
  }

  // Extraer cols de tiempo (todo excepto las 2 primeras)
  const timeCols=header.slice(2).filter(Boolean);
  return {days,header,timeCols};
}

/* PERSONAL
   Estructura: columna A = ESCENARIO N (merged), columna B = ROL/N.TECNICO/CONTACTO/OTROS
               cabecera de turno en fila highlight: TURNO 1 / TURNO 2
               columnas C+ = roles (STAGE MANAGER, FOH, MON, ESCENARIO 1, ESCENARIO 2, ILUMINACION 1...)
*/
function parsePersonal(rows){
  if(!rows||!rows.length)return null;
  const result={};
  let curEsc='';
  let curTurno='';
  let curRoles=[];
  rows.forEach(row=>{
    const colA=(row[0]||'').toString().trim();
    const colB=(row[1]||'').toString().trim().toUpperCase();
    const rest=row.slice(2).map(c=>(c||'').toString().trim());
    // Nueva fila de escenario (col A tiene valor)
    if(colA) curEsc=colA;
    // Fila de turno: colB vacío pero alguna celda del resto tiene "TURNO"
    const allCols=row.map(c=>(c||'').toString().trim());
    const turnoCell=allCols.find(c=>/TURNO\s*\d+/i.test(c));
    if(turnoCell){
      curTurno=turnoCell;
      curRoles=[];
      if(!result[curEsc])result[curEsc]={};
      if(!result[curEsc][curTurno])result[curEsc][curTurno]={roles:[],tecnicos:[],contactos:[],otros:[]};
      return;
    }
    if(!curEsc||!curTurno)return;
    const block=result[curEsc][curTurno];
    if(!block)return;
    if(colB==='ROL'){block.roles=rest.filter(Boolean);curRoles=rest;}
    else if(colB==='N. TECNICO'||colB==='N.TECNICO'||colB==='TECNICO')block.tecnicos=rest;
    else if(colB==='CONTACTO')block.contactos=rest;
    else if(colB==='OTROS')block.otros=rest;
  });
  return Object.keys(result).length?result:null;
}

/* ── INFO ── */
function getInfo(keys){
  const info=projectData.info;
  for(const k of keys){
    if(info[k]&&info[k].trim())return info[k];
    const ku=k.toUpperCase();
    if(info[ku]&&info[ku].trim())return info[ku];
    const found=Object.keys(info).find(ik=>ik.toUpperCase().includes(ku));
    if(found&&info[found]&&info[found].trim())return info[found];
  }
  return '—';
}

function makeLink(val){
  if(!val||val==='—')return esc(val);
  if(/^https?:\/\//i.test(val.trim())){
    return `<a href="${esc(val.trim())}" target="_blank" rel="noopener" style="color:var(--accent);text-decoration:underline;word-break:break-all;font-size:13px">${esc(val.trim())}</a>`;
  }
  return esc(val);
}

function renderEscenarios(escStr){
  if(!escStr||escStr==='—')return '—';
  // Formato: "2 (Stage 1, Stage 2)" o "Stage 1, Stage 2" o "2"
  const parenMatch=escStr.match(/\(([^)]+)\)/);
  if(parenMatch){
    const num=parseInt(escStr)||'';
    const names=parenMatch[1].split(',').map(s=>s.trim()).filter(Boolean);
    return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">${names.map((n,i)=>`<span style="display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:${STAGE_COLORS[i%STAGE_COLORS.length]}22;color:${STAGE_COLORS[i%STAGE_COLORS.length]};border:1px solid ${STAGE_COLORS[i%STAGE_COLORS.length]}44">${esc(n)}</span>`).join('')}</div>`;
  }
  // Solo número
  if(/^\d+$/.test(escStr.trim())){
    const n=parseInt(escStr);
    return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">${Array.from({length:n},(_,i)=>`<span style="padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:${STAGE_COLORS[i%STAGE_COLORS.length]}22;color:${STAGE_COLORS[i%STAGE_COLORS.length]}">Stage ${i+1}</span>`).join('')}</div>`;
  }
  // Lista de nombres
  const names=escStr.split(',').map(s=>s.trim()).filter(Boolean);
  return `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:6px">${names.map((n,i)=>`<span style="padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;background:${STAGE_COLORS[i%STAGE_COLORS.length]}22;color:${STAGE_COLORS[i%STAGE_COLORS.length]}">${esc(n)}</span>`).join('')}</div>`;
}

function renderInfo(){
  const fieldMap=[
    {keys:['NOMBRE EVENTO','NOMBRE'],label:'Nombre del evento',accent:true,full:true},
    {keys:['UBICACION','UBICACIÓN','LUGAR'],label:'Ubicación',link:true},

    let tbody='';

      <div class="io-head"><div class="io-name">${esc(name)}</div><div class="io-meta">${m.outs.length} salidas</div></div>
      <table class="io-table">
        <thead><tr><th style="width:36px">Out</th><th>Patch</th><th>Monitor</th><th>Notas</th></tr></thead>
        <tbody>${m.outs.map(o=>`<tr>
          <td class="ch">${esc(o.out)}</td>
          <td>${esc(o.patch)||'·'}</td>
          <td class="inst">${esc(o.monitor)||'·'}</td>
          <td style="color:var(--tx2);font-family:inherit">${esc(o.notas)}</td>
        </tr>`).join('')}</tbody>
      </table></div>`;
  }

  return `<div class="sec-title">Monitores</div>
    <div class="sec-sub">Output list · ${mons.length} banda${mons.length!==1?'s':''}</div>
    ${tabs}${content}`;
}
function setBandaMon(i){activeBanda=i;showSection('monitores');}

/* ── PERSONAL ── */
function renderPersonal(){
  const pers=projectData.personal;
  if(!pers||!Object.keys(pers).length)return emptyMsg('Personal','Añade datos a la hoja PERSONAL.','users');

  const totalTecs=Object.values(pers)
    .flatMap(t=>Object.values(t))
    .flatMap(b=>b.tecnicos||[])
    .filter(Boolean).length;

  let html=`<div class="sec-title">Personal</div>
    <div class="sec-sub">Equipo técnico por escenario y turno · ${totalTecs} técnicos</div>`;

  Object.entries(pers).forEach(([escName,turnos])=>{
    html+=`<div class="esc-block">
      <div class="esc-head">
        <div class="esc-head-icon"><svg viewBox="0 0 24 24"><path d="M2 20h20M4 20V10l8-6 8 6v10"/><path d="M10 20v-6h4v6"/></svg></div>
        <div class="esc-name">${esc(escName)}</div>
      </div>`;

    Object.entries(turnos).forEach(([turnoName,block])=>{
      const roles=block.roles||[];
      const tecnicos=block.tecnicos||[];
      const contactos=block.contactos||[];
      const otros=block.otros||[];
      if(!roles.length)return;

      html+=`<div class="turno-head"><span class="turno-tag">${esc(turnoName)}</span></div>
        <div style="overflow-x:auto">
        <table class="turno-table" style="min-width:100%">
          <thead><tr>
            <th style="text-align:left;min-width:90px">—</th>
            ${roles.map(r=>`<th>${esc(r)}</th>`).join('')}
          </tr></thead>
          <tbody>
            <tr>
              <td class="role-label">Técnico</td>
              ${roles.map((_,i)=>`<td class="tec-name">${esc(tecnicos[i]||'')||'<span style="color:var(--tx3)">·</span>'}</td>`).join('')}
            </tr>
            <tr>
              <td class="role-label">Contacto</td>
              ${roles.map((_,i)=>`<td class="tec-contact">${esc(contactos[i]||'')}</td>`).join('')}
            </tr>
            ${otros.some(Boolean)?`<tr>
              <td class="role-label">Otros</td>
              ${roles.map((_,i)=>`<td class="tec-contact">${esc(otros[i]||'')}</td>`).join('')}
            </tr>`:''}
          </tbody>
        </table></div>`;
    });

    html+='</div>';
  });

  return html;
}

/* ── EMPTY ── */
function emptyMsg(title,msg,icon){
  const icons={
    clock:'<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>',
    grid:'<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>',
    sum:'<path d="M9 3H5a2 2 0 00-2 2v4m6-6h10a2 2 0 012 2v4"/>',
    file:'<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/>',
    users:'<path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/>',
  };
  return `<div class="empty-state"><svg viewBox="0 0 24 24">${icons[icon]||icons.file}</svg><h3>${esc(title)}</h3><p>${msg}</p></div>`;
}

</script>
